<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Track - 멤버 관리</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>

<body class="bg-light">

<!-- TOP BAR -->
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/">📖 Study Track</a>
        <div id="navAuthArea" class="d-flex gap-2 align-items-center"></div>
    </div>
</nav>

<div class="container py-4">

    <!-- BREADCRUMB -->
    <div class="mb-3">
        <div class="text-muted small">
            <a th:href="@{/study/{id}(id=${study.id})}" class="text-decoration-none">스터디</a>
            <span class="mx-1">/</span>
            <span>멤버 관리</span>
        </div>
    </div>

    <div class="row">

        <!-- MAIN -->
        <div class="col-md-8">

            <!-- HEADER -->
            <div class="bg-white p-4 rounded shadow-sm mb-4">
                <h3 class="fw-bold mb-1">👥 멤버 관리</h3>
                <p class="text-muted mb-0">
                    멤버 초대, 역할 변경, 멤버 내보내기를 할 수 있어요.
                </p>
            </div>

            <ul class="nav nav-tabs mb-3">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="member-list" data-bs-toggle="tab" data-bs-target="#list-member"
                            type="button" role="tab" aria-controls="list-member" aria-selected="true">
                        멤버 목록
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="approval-list" data-bs-toggle="tab" data-bs-target="#list-approval"
                            type="button" role="tab" aria-controls="list-approval" aria-selected="false">
                        가입 신청 <span class="badge bg-danger ms-1" th:text="${waitingCount}">0</span>
                    </button>
                </li>

            </ul>

            <div class="tab-content">

                <div class="tab-pane fade show active" id="list-member" role="tabpanel" aria-labelledby="member-list">
                    <div class="bg-white p-3 rounded shadow-sm mb-3">
                        <form th:action="@{/study/{id}/members(id=${study.id})}" method="get">
                            <input type="hidden" name="userId" th:value="${param.userId}">

                            <div class="row g-2 align-items-center">
                                <div class="col-md-6">
                                    <input type="text" class="form-control" name="q"
                                           placeholder="멤버 검색 (이름)"
                                           th:value="${q}">
                                </div>
                                <div class="col-md-3">
                                    <select class="form-select" name="roleFilter">
                                        <option value="" th:selected="${roleFilter == null || roleFilter == ''}">전체 역할</option>
                                        <option value="OWNER" th:selected="${roleFilter == 'OWNER'}">운영자</option>
                                        <option value="MANAGER" th:selected="${roleFilter == 'MANAGER'}">매니저</option>
                                        <option value="MEMBER" th:selected="${roleFilter == 'MEMBER'}">팀원</option>
                                    </select>
                                </div>
                                <div class="col-md-3 d-grid gap-2 d-md-flex">
                                    <button type="submit" class="btn btn-primary flex-grow-1">필터 적용</button>
                                    <a th:href="@{/study/{id}/members(id=${study.id}, userId=${param.userId})}"
                                       class="btn btn-outline-secondary">초기화</a>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- MEMBER LIST -->
                    <div class="bg-white rounded shadow-sm mb-4">
                        <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                            <div class="fw-bold">멤버 목록</div>
                            <div class="text-muted small">
                                총 <span th:text="${memberCount}">0</span>명
                            </div>
                        </div>

                        <div class="list-group list-group-flush">

                            <div class="list-group-item d-flex align-items-center py-3" th:each="m : ${members}">

                                <div style="flex: 1;">
                                    <div class="fw-bold fs-6" th:text="${m.nickname}">홍길동</div>
                                    <div class="text-muted" style="font-size: 0.8rem;">
                                        가입일: <span th:text="${#temporals.format(m.joinedAt, 'yyyy-MM-dd')}">2026-02-20</span>
                                    </div>
                                </div>

                                <div class="text-center" style="flex: 1;">
                                    <div th:switch="${m.role.name()}">
                                        <span th:case="'OWNER'" class="badge bg-primary px-3">OWNER</span>
                                        <span th:case="'MANAGER'" class="badge bg-secondary px-3">MANAGER</span>
                                        <span th:case="'MEMBER'" class="badge bg-light text-dark border px-3">MEMBER</span>
                                    </div>
                                </div>

                                <div class="d-flex gap-2 justify-content-end align-items-center" style="flex: 1.5;">
                                    <form th:action="@{/study/{studyId}/members/{memberId}/role(studyId=${study.id}, memberId=${m.id})}" method="post" class="d-flex gap-1 m-0">
                                        <input type="hidden" name="userId" th:value="${param.userId}">
                                        <select name="role" class="form-select form-select-sm" style="width: 100px;" th:disabled="${m.role.name() == 'OWNER' or myInfo.role.name() == 'MEMBER'}">
                                            <option value="MEMBER" th:selected="${m.role.name() == 'MEMBER'}">팀원</option>
                                            <option value="MANAGER" th:selected="${m.role.name() == 'MANAGER'}">매니저</option>
                                        </select>
                                        <button type="submit" class="btn btn-sm btn-outline-primary text-nowrap"
                                                th:disabled="${m.role.name() == 'OWNER' or myInfo.role.name() == 'MEMBER'}">
                                            변경
                                        </button>
                                    </form>

                                    <form th:action="@{/study/{studyId}/members/{memberId}/kick(studyId=${study.id}, memberId=${m.id})}"
                                          method="post" class="m-0">
                                        <input type="hidden" name="userId" th:value="${param.userId}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger text-nowrap"
                                                th:disabled="${m.role.name() == 'OWNER' or myInfo.role.name() == 'MEMBER'}"
                                                onclick="return confirm('이 멤버를 내보낼까요?');">
                                            내보내기
                                        </button>
                                    </form>
                                </div>

                            </div>

                            <!-- empty -->
                            <div class="list-group-item text-muted small"
                                 th:if="${members == null || members.isEmpty()}">
                                멤버가 없습니다.
                            </div>

                        </div>
                    </div>
                    <!-- BACK -->
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/study/{id}(id=${study.id})}" class="btn btn-outline-secondary">
                            돌아가기
                        </a>
                    </div>
                </div>

                <div class="tab-pane fade" id="list-approval" role="tabpanel" aria-labelledby="approval-list">
                    <div class="bg-white p-3 rounded shadow-sm mb-3">
                        <form th:action="@{/study/{id}/members(id=${study.id})}" method="get">
                            <input type="hidden" name="userId" th:value="${param.userId}">
                            <input type="hidden" name="tab" value="approval">
                            <div class="row g-2 align-items-center">
                                <div class="col-md-6">
                                    <input type="text" class="form-control" name="appQ"
                                           placeholder="신청자 닉네임 검색" th:value="${appQ}">
                                </div>
                                <div class="col-md-3">
                                    <select class="form-select" name="statusFilter">
                                        <option value="WAITING" th:selected="${statusFilter == null || statusFilter == 'WAITING'}">대기중</option>
                                        <option value="APPROVED" th:selected="${statusFilter == 'APPROVED'}">승인됨</option>
                                        <option value="REJECTED" th:selected="${statusFilter == 'REJECTED'}">거절됨</option>
                                    </select>
                                </div>
                                <div class="col-md-3 d-grid gap-2 d-md-flex">
                                    <button type="submit" class="btn btn-primary flex-grow-1">필터 적용</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="bg-white rounded shadow-sm mb-4">
                        <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                            <div class="fw-bold">신청 내역</div>
                            <div class="text-muted small">총 <span th:text="${waitingCount}">0</span>건</div>
                        </div>

                        <div class="list-group list-group-flush">
                            <div class="list-group-item d-flex align-items-center py-3" th:each="app : ${waitingMembers}">

                                <div style="flex: 1;">
                                    <div th:text="${app.nickname}">신청자명</div>
                                    <div class="text-muted small">
                                        신청일: <span th:text="${#temporals.format(app.applicationAt, 'yyyy-MM-dd HH:mm')}">2026-03-21</span>
                                    </div>
                                </div>

                                <div class="text-center" style="flex: 1;">
                                    <span th:if="${app.status.name() == 'WAITING'}" class="badge bg-warning text-dark px-3">WAITING</span>
                                    <span th:if="${app.status.name() == 'APPROVED'}" class="badge bg-success px-3">APPROVED</span>
                                    <span th:if="${app.status.name() == 'REJECTED'}" class="badge bg-secondary px-3">REJECTED</span>
                                </div>

                                <div class="d-flex gap-2 justify-content-end align-items-center" style="flex: 1.5;">
                                    <th:block th:if="${app.status.name() == 'WAITING'}">
                                        <form th:action="@{/study/{studyId}/members/{memberId}/approve(studyId=${study.id}, memberId=${app.id})}" method="post" class="m-0">
                                            <input type="hidden" name="userId" th:value="${param.userId}">
                                            <button type="submit" class="btn btn-sm btn-primary text-nowrap"
                                                    th:disabled="${myInfo.role.name() == 'MEMBER'}">승인</button>
                                        </form>

                                        <form th:action="@{/study/{studyId}/members/{memberId}/reject(studyId=${study.id}, memberId=${app.id})}" method="post" class="m-0">
                                            <input type="hidden" name="userId" th:value="${param.userId}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger text-nowrap"
                                                    th:disabled="${myInfo.role.name() == 'MEMBER'}"
                                                    onclick="return confirm('신청을 거절하시겠습니까?');">거절</button>
                                        </form>
                                    </th:block>

                                    <span th:unless="${app.status.name() == 'WAITING'}" class="text-muted small">처리 완료</span>
                                </div>
                            </div>

                            <div class="list-group-item text-muted small py-4 text-center"
                                 th:if="${#lists.isEmpty(waitingMembers)}">
                                가입 신청 내역이 없습니다.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- SIDE -->
        <div class="col-md-4">

            <!-- STUDY SUMMARY -->
            <div class="bg-white p-4 rounded shadow-sm mb-3">
                <h6 class="fw-bold mb-2">📌 현재 스터디</h6>
                <div class="small">
                    <div class="mb-1">
                        <span class="text-muted">스터디명</span><br>
                        <span class="fw-semibold" th:text="${study.title}">알고리즘 스터디</span>
                    </div>
                    <div class="mb-1">
                        <span class="text-muted">멤버</span><br>
                        👥 <span th:text="${study.memberCount}">5</span> / <span th:text="${study.maxMembers}">8</span>
                    </div>
                    <div>
                        <span class="text-muted">공개</span><br>
                        <span class="badge bg-primary" th:text="${study.visibility}">PUBLIC</span>
                    </div>
                </div>
            </div>

            <!-- INVITE -->
            <div class="bg-white p-4 rounded shadow-sm mb-3">
                <h6 class="fw-bold mb-2">✉️ 멤버 초대</h6>

                <!-- email invite -->
                <div class="fw-bold mb-2">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div><div class="text-muted">초대 코드</div></div>
                        <code th:text="${study.inviteCode}" class="px-3 py-2 bg-white rounded border">STUDY-1234</code>
                    </div>
                </div>
            </div>

            <!-- QUICK ACTIONS -->
            <div class="bg-white p-4 rounded shadow-sm">
                <div th:replace="~{study/common/fragments :: quickActions(${study.id}, ${study.inviteCode})}"></div>
            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/nav-auth-area.js}"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. URL에서 파라미터를 읽어옵니다.
        const urlParams = new URLSearchParams(window.location.search);
        const activeTab = urlParams.get('tab');

        // 2. 만약 tab 파라미터 값이 'approval'이라면 가입 신청 탭을 클릭해줍니다.
        if (activeTab === 'approval') {
            const approvalTabTrigger = document.querySelector('#approval-list');
            if (approvalTabTrigger) {
                const tab = new bootstrap.Tab(approvalTabTrigger);
                tab.show();
            }
        }
    });
</script>
</body>
</html>
