<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Track - 스터디 설정</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- TOP BAR -->
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <a href="/" class="navbar-brand fw-bold text-primary">📖 Study Track</a>
        <div id="navAuthArea"></div>
    </div>
</nav>

<div class="container py-4">

    <!-- BREADCRUMB -->
    <div class="mb-3">
        <div class="text-muted small">
            <a th:href="@{/study/{id}(id=${study.id})}" class="text-decoration-none">스터디</a>
            <span class="mx-1">/</span>
            <span>설정</span>
        </div>
    </div>

    <div class="row">

        <!-- MAIN -->
        <div class="col-md-8">

            <!-- HEADER -->
            <div class="bg-white p-4 rounded shadow-sm mb-4">
                <h3 class="fw-bold mb-1">⚙️ 스터디 설정</h3>
                <p class="text-muted mb-0">
                    스터디 정보 수정, 공개 범위 설정을 할 수 있어요.
                </p>
            </div>

            <!-- BASIC INFO -->
            <div class="bg-white p-4 rounded shadow-sm mb-4">
                <h5 class="fw-bold mb-3">기본 정보</h5>

                <form th:action="@{/study/{id}/settings(id=${study.id})}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">스터디 이름</label>
                        <input type="text" name="title" class="form-control"
                               th:value="${study.title}" value="알고리즘 스터디" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">설명</label>
                        <textarea name="description" class="form-control" rows="5"
                                  th:text="${study.description}">매주 문제 풀이 및 코드 리뷰</textarea>
                    </div>

                    <div class="row g-3 mb-3">

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">정원</label>
                            <input type="number" min="2" max="100" name="maxMembers" class="form-control"
                                   th:value="${study.maxMembers}" value="8">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">카테고리</label>
                            <select class="form-select" name="category">
                                <option value="CS" th:selected="${study.category == 'CS'}">전공 / CS</option>
                                <option value="CERTIFICATE" th:selected="${study.category.name() == 'CERTIFICATE'}">자격증</option>
                                <option value="CODING_TEST" th:selected="${study.category.name() == 'CODING_TEST'}">코딩 테스트</option>
                                <option value="PROJECT" th:selected="${study.category.name() == 'PROJECT'}">프로젝트</option>
                                <option value="LANGUAGE" th:selected="${study.category.name() == 'LANGUAGE'}">외국어</option>
                                <option value="ETC" th:selected="${study.category.name() == 'ETC'}">기타</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">공개 상태</label>
                            <select id="visibility" class="form-select" name="visibility">
                                <option value="PUBLIC" th:selected="${study.visibility.name() == 'PUBLIC'}">공개</option>
                                <option value="PRIVATE" th:selected="${study.visibility.name() == 'PRIVATE'}">비공개</option>
                            </select>
                            <div class="form-text">비공개 시 초대 코드로만 입장 가능해요.</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end">
                        <button class="btn btn-primary" type="submit">저장</button>
                    </div>
                </form>
            </div>

            <!-- DANGER ZONE -->
            <div class="bg-white p-4 rounded shadow-sm border border-danger mb-4">
                <h5 class="fw-bold text-danger mb-2">위험 구역</h5>
                <p class="text-muted small mb-3">
                    아래 작업은 되돌릴 수 없어요. 신중하게 진행하세요.
                </p>

                <form th:action="@{/study/{id}/delete(id=${study.id})}" method="post">
                    <div class="mb-2">
                        <label class="form-label fw-semibold text-danger">스터디 삭제</label>
                        <div class="form-text">
                            삭제하면 공지/과제/멤버 데이터가 모두 사라집니다.
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('정말 삭제할까요? 이 작업은 되돌릴 수 없습니다.');">
                        스터디 삭제
                    </button>
                </form>
            </div>

            <!-- BACK -->
            <div class="d-flex justify-content-between">
                <a th:href="@{/study/{id}(id=${study.id})}" class="btn btn-outline-secondary">
                    돌아가기
                </a>
                <a th:href="@{/}" class="btn btn-outline-primary">
                    홈
                </a>
            </div>

        </div>

        <!-- SIDE -->
        <div class="col-md-4">

            <!-- STUDY SUMMARY -->
            <div class="bg-white p-4 rounded shadow-sm mb-3">
                <h6 class="fw-bold mb-2">📌 스터디 정보</h6>
                <div class="small">
                    <div class="mb-1">
                        <span class="text-muted">스터디명</span><br>
                        <span class="fw-semibold" th:text="${study.title}">알고리즘 스터디</span>
                    </div>
                    <div class="mb-1">
                        <span class="text-muted">멤버</span><br>
                        👥 <span th:text="${study.memberCount}">5</span>명
                    </div>
                    <div>
                        <span class="text-muted">운영자</span><br>
                        <span th:text="${ownerName}">홍길동</span>
                    </div>
                </div>
            </div>

            <!-- QUICK ACTIONS -->
            <div class="bg-white p-4 rounded shadow-sm">
                <h6 class="fw-bold mb-2">⚡ 빠른 작업</h6>
                <a th:href="@{/notices/create?studyId={id}(id=${study.id})}"
                   class="btn btn-outline-primary btn-sm w-100 mb-2">
                    공지 작성
                </a>
                <a th:href="@{/assignment/create?studyId={id}(id=${study.id})}"
                   class="btn btn-outline-primary btn-sm w-100 mb-2">
                    과제 추가
                </a>
                <a th:href="@{/study/{id}/members(id=${study.id})}"
                   class="btn btn-outline-secondary btn-sm w-100">
                    멤버 보기
                </a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* 상단과 동일한 JS 인증 로직 */
    document.addEventListener("DOMContentLoaded", function() {
        const navArea = document.getElementById("navAuthArea");
        const token = localStorage.getItem("accessToken");
        const nickname = localStorage.getItem("nickname");
        const userId = localStorage.getItem("userId");
        const isExist = (val) => val && val !== "null" && val !== "undefined" && val !== "";
        if (isExist(token)) {
            const finalName = isExist(nickname) ? nickname : userId;
            navArea.innerHTML = `<span class="fw-bold me-2 text-dark">${finalName} 님</span><button class="btn btn-outline-danger btn-sm" onclick="logout()">로그아웃</button>`;
        } else {
            navArea.innerHTML = `<a href="/auth/signup" class="btn btn-primary btn-sm">회원가입</a> <a href="/auth/login" class="btn btn-outline-primary btn-sm">로그인</a>`;
        }
    });
    function logout() { if(confirm("로그아웃 하시겠습니까?")) { localStorage.clear(); window.location.href = "/"; } }

    <!-- studySetting -->
    document.addEventListener("DOMContentLoaded", function() {
    // 폼 요소 선택
    const settingForm = document.querySelector('form[action*="/settings"]');

    if (settingForm) {
        settingForm.addEventListener("submit", async function(e) {
            e.preventDefault(); // 기본 폼 제출 동작 방지

            if (!confirm("스터디 정보를 수정하시겠습니까?")) return;

            const token = localStorage.getItem("accessToken");
            if (!token) {
                alert("로그인이 필요합니다.");
                window.location.href = "/auth/login";
                return;
            }

            // 1. 데이터 수집
            const formData = new FormData(settingForm);
            const studyId = "[[${study.id}]]"; // 타임리프 변수 활용

            // FormData를 JSON 객체로 변환
            const payload = {
                title: formData.get("title"),
                description: formData.get("description"),
                maxMembers: parseInt(formData.get("maxMembers")),
                category: formData.get("category"),
                visibility: formData.get("visibility"),
            };

            // 2. 서버 통신 (PUT 방식 추천)
            try {
                const response = await fetch(`/api/study/${studyId}/setting`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": token.startsWith("Bearer ") ? token : `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("스터디 정보가 성공적으로 수정되었습니다.");

                    window.location.href = `/study/${studyId}`;
                } else {
                    const errorText = await response.text();
                    alert("수정 실패: " + (errorText || "알 수 없는 오류가 발생했습니다."));
                }
            } catch (error) {
                console.error("Error updating study:", error);
                alert("서버와 통신 중 오류가 발생했습니다.");
            }
        });
    }
    });
</script>
</body>
</html>
