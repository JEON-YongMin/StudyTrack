<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Track - Study Detail</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/">📖 Study Track</a>
        <div id="navAuthArea"></div>
    </div>
</nav>

<div class="container py-4">

    <!-- HEADER -->
    <div class="bg-white p-4 rounded shadow-sm mb-4">
        <h3 class="fw-bold mb-2" th:text="${study.title}">스터디 제목</h3>
        <p class="text-muted mb-2" th:text="${study.description}">
            스터디 설명
        </p>
        <span class="badge bg-primary" th:text="${study.category}">CS</span>

        <span class="badge bg-secondary ms-1">
            👥 <span th:text="${study.memberCount}">참여인원</span>
            /
            <span th:text="${study.maxMembers}">최대인원</span>명 참여
        </span>
    </div>

    <div class="row">

        <!-- MAIN -->
        <div class="col-md-8">

            <!-- NOTICE -->
            <div class="bg-white p-4 rounded shadow-sm mb-4">
                <h5 class="fw-bold mb-3">📢 공지사항</h5>

                <div th:each="notice : ${notice}" class="border-bottom py-2">
                    <a th:href="@{/study/{studyId}/notice/{noticeId}(studyId=${study.id}, noticeId=${notice.id}, mode='view')}">
                        <div class="fw-semibold" th:text="${notice.title}">공지 제목</div>
                        <small class="text-muted" th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd')}">2026-02-04</small>
                    </a>
                </div>

                <a th:href="@{/study/{studyId}/notice(studyId=${study.id}, mode='create')}" class="btn btn-sm btn-outline-primary mt-3">
                    공지 작성
                </a>
            </div>

            <!-- ASSIGNMENTS -->
            <div class="bg-white p-4 rounded shadow-sm mb-4">
                <h5 class="fw-bold mb-3">📚 과제 목록</h5>

                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action" th:each="task : ${assignments}" th:href="@{/study/{studyId}/assignment/{assignmentId}(studyId=${study.id}, assignmentId=${task.id})}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="fw-semibold" th:text="${task.title}">
                                    알고리즘 문제 1
                                </div>
                                <small class="text-muted">
                                    마감: <span th:text="${task.dueDate}"></span>
                                </small>
                            </div>
                            <span class="badge bg-warning" th:if="${task.progress != null and task.progress.name() == 'INPROGRESS'}">
                              진행중
                            </span>
                            <span class="badge bg-success" th:if="${task.progress != null and task.progress.name() == 'COMPLETED'}">
                              완료
                            </span>
                        </div>
                    </a>
                </div>

                <a class="btn btn-primary"
                   th:href="@{'/study/' + ${study.id} + '/assignments/new'}">
                    과제 추가
                </a>
            </div>

        </div>

        <!-- SIDE -->
        <div class="col-md-4">

            <!-- PROGRESS -->
            <div class="bg-white p-4 rounded shadow-sm mb-3">
                <h6 class="fw-bold mb-2">📈 진행률</h6>
                <div class="progress mb-2">
                    <div class="progress-bar"
                         role="progressbar"
                         th:style="'width:' + ${progress} + '%'">
                    </div>
                </div>
                <small class="text-muted">
                    <span th:text="${progress}">72</span>% 완료
                </small>
            </div>

            <!-- MEMBERS -->
            <div class="bg-white p-4 rounded shadow-sm mb-3">
                <h6 class="fw-bold mb-3">👥 멤버</h6>

                <ul class="list-unstyled small">
                    <li class="mb-2 d-flex justify-content-between"
                        th:each="member : ${members}">
                        <span th:text="${member.name}">홍길동</span>
                        <span class="badge bg-light text-dark"
                              th:text="${member.role}">팀원</span>
                    </li>
                </ul>

                <a href="/member/invite" class="btn btn-sm btn-outline-primary w-100">
                    멤버 초대
                </a>
            </div>

            <!-- QUICK ACTIONS -->
            <div class="bg-white p-4 rounded shadow-sm">
                <h6 class="fw-bold mb-2">⚡ 빠른 작업</h6>
                <a th:href="@{/study/{studyId}/notice
                (studyId=${study.id}, mode='create')}" class="btn btn-outline-primary btn-sm w-100 mb-2">
                    공지 작성
                </a>
                <a th:href="@{'/study/' + ${study.id} + '/assignments/new'}" class="btn btn-primary btn-sm w-100 mb-2">
                    과제 추가
                </a>
                <a th:href="@{'/study/' + ${study.id} + '/setting'}" class="btn btn-outline-secondary btn-sm w-100">
                    스터디 설정
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>

<script>
    /* 상단과 동일한 JS 인증 로직 */
    document.addEventListener("DOMContentLoaded", function() {
        const navArea = document.getElementById("navAuthArea");
        const token = localStorage.getItem("accessToken");
        const nickname = localStorage.getItem("nickname");
        const userId = localStorage.getItem("userId");
        const isExist = (val) => val && val !== "null" && val !== "undefined" && val !== "";
        if (isExist(token)) {
            const finalName = isExist(nickname) ? nickname : userId;
            navArea.innerHTML = `<span class="fw-bold me-2 text-dark">${finalName} 님</span><button class="btn btn-outline-danger btn-sm" onclick="logout()">로그아웃</button>`;
        } else {
            navArea.innerHTML = `<a href="/auth/signup" class="btn btn-primary btn-sm">회원가입</a> <a href="/auth/login" class="btn btn-outline-primary btn-sm">로그인</a>`;
        }
    });
    function logout() { if(confirm("로그아웃 하시겠습니까?")) { localStorage.clear(); window.location.href = "/"; } }

<!-- studyDetail -->

    function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function setText(selector, text) {
    const el = document.querySelector(selector);
    if (el) el.textContent = text;
  }

  async function loadStudyDetail() {
    const studyId = getQueryParam("studyId");
    if (!studyId) return;

    const token = localStorage.getItem("accessToken");
    if (!token) {
      alert("로그인이 필요합니다.");
      window.location.href = "/auth/login";
      return;
    }

    const res = await fetch(`/api/studyCreate/${studyId}`, {
      headers: {
        "Authorization": token.startsWith("Bearer ") ? token : `Bearer ${token}`
      }
    });

    if (!res.ok) {
      const msg = await res.text().catch(() => "");
      alert(`스터디 정보를 불러오지 못했습니다. (status=${res.status})\n${msg}`);
      return;
    }

    const data = await res.json();
    // 화면 채우기
    setText(".bg-white.p-4.rounded.shadow-sm.mb-4 h3.fw-bold", data.title);
    setText(".bg-white.p-4.rounded.shadow-sm.mb-4 p.text-muted", data.description);
    setText(".bg-white.p-4.rounded.shadow-sm.mb-4 .badge.bg-primary", data.category);

    // 참여 인원은 지금 백엔드에 없으니 임시로 1명(개설자) 처리
    setText(".bg-white.p-4.rounded.shadow-sm.mb-4 .badge.bg-secondary span", "1");

    // 초대코드도 화면에 표시하고 싶다면: detail.html에 code 영역을 만들거나 원하는 위치 selector 지정
    // 예: setText("#inviteCode", data.inviteCode);
  }

  document.addEventListener("DOMContentLoaded", loadStudyDetail);
</script>
