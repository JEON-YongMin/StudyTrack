<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Track - Study Detail</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/">📖 Study Track</a>
        <div id="navAuthArea" class="d-flex gap-2 align-items-center"></div>
    </div>
</nav>

<div class="container py-4">
    <div class="bg-white p-4 rounded shadow-sm mb-4">
        <h3 class="fw-bold mb-2" th:text="${study.title}">스터디 제목</h3>
        <p class="text-muted mb-2" th:text="${study.description}">설명</p>
        <span class="badge bg-primary" th:text="${study.category}">CS</span>
        <span class="badge bg-secondary ms-1">👥 <span th:text="${study.memberCount}">0</span>/<span th:text="${study.maxMembers}">0</span>명 참여</span>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="bg-white p-4 rounded shadow-sm mb-4">
                <h5 class="fw-bold mb-3">📢 공지사항</h5>
                <div th:each="notice : ${notice}" class="border-bottom py-2">
                    <a th:href="@{/study/{sid}/notice/{nid}(sid=${study.id}, nid=${notice.id}, mode='view')}">
                        <div class="fw-semibold" th:text="${notice.title}">공지 제목</div>
                        <small class="text-muted" th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd')}">날짜</small>
                    </a>
                </div>
                <a th:href="@{/study/{sid}/notice(sid=${study.id}, mode='create')}" class="btn btn-sm btn-outline-primary mt-3">공지 작성</a>
            </div>

            <div class="bg-white p-4 rounded shadow-sm mb-4">
                <h5 class="fw-bold mb-3">📚 과제 목록</h5>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action" th:each="task : ${assignments}" th:href="@{/study/{sid}/assignment/{aid}(sid=${study.id}, aid=${task.id})}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="fw-semibold" th:text="${task.title}">과제명</div>
                                <small class="text-muted">마감: <span th:text="${task.dueDate}"></span></small>
                            </div>
                            <span class="badge bg-warning" th:if="${task.progress?.name() == 'INPROGRESS'}">진행중</span>
                            <span class="badge bg-success" th:if="${task.progress?.name() == 'COMPLETED'}">완료</span>
                        </div>
                    </a>
                </div>
                <a class="btn btn-primary mt-3" th:href="@{'/study/' + ${study.id} + '/assignments/new'}">과제 추가</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="bg-white p-4 rounded shadow-sm mb-3">
                <h6 class="fw-bold mb-2">📈 진행률</h6>
                <div class="progress mb-2">
                    <div class="progress-bar" role="progressbar" th:style="'width:' + ${progress} + '%'"></div>
                </div>
                <small class="text-muted"><span th:text="${progress}">0</span>% 완료</small>
            </div>

            <div class="bg-white p-4 rounded shadow-sm mb-3">
                <h6 class="fw-bold mb-3">👥 멤버</h6>
                <ul class="list-unstyled small">
                    <li class="mb-2 d-flex justify-content-between" th:each="member : ${members}">
                        <span th:text="${member.name}">이름</span>
                        <span class="badge bg-light text-dark" th:text="${member.role}">역할</span>
                    </li>
                </ul>

                <button type="button" onclick="memberManagement()" class="btn btn-sm btn-outline-primary w-100 mb-3">멤버 관리</button>
                <button type="button" onclick="inviteMember()" class="btn btn-sm btn-outline-primary w-100 mb-3">멤버 초대</button>

                <div class="p-3 rounded border bg-light text-center">
                    <div class="small fw-semibold text-muted mb-1">초대 코드</div>
                    <div class="fw-bold text-primary fs-5" style="letter-spacing: 1px;" th:text="${study.inviteCode}">STUDY-XXXXXX</div>
                </div>
            </div>

            <!-- QUICK ACTIONS -->
            <div class="bg-white p-4 rounded shadow-sm">
                <div th:replace="~{study/common/fragments :: quickActions(${study.id}, ${study.inviteCode})}"></div>
            </div>

        </div>
    </div>

</div>

</body>
<script th:src="@{/js/nav-auth-area.js}"></script>
<script th:inline="javascript">
    async function inviteMember() {
        const nickname = prompt("초대할 유저의 닉네임을 입력하세요:");
        if (!nickname) return;
        const studyId = [[${study.id}]];
        const token = localStorage.getItem("accessToken");
        const res = await fetch(`/api/study/${studyId}/setting/invite?nickname=${nickname}`, {
            method: "POST",
            headers: { "Authorization": "Bearer " + token }
        });
        if (res.ok) alert("초대 완료!");
        else alert("초대 실패: " + await res.text());
    }

    async function memberManagement() {

        const studyId = [[${study.id}]];

        const userId = localStorage.getItem('userId');

        if (!userId) {
            alert("로그인 정보가 없습니다. 다시 로그인해 주세요.");
            window.location.href = "/auth/login";
            return;
        }

        location.href = `/study/${studyId}/members?userId=${userId}`;
    }

</script>
</body>
</html>
