<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Track - 스터디 개설</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar bg-white shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/" class="navbar-brand fw-bold text-primary">📖 Study Track</a>
        <div id="navAuthArea" class="d-flex gap-2 align-items-center"></div>
    </div>
</nav>

<section class="container py-5 text-center">
    <h2 class="fw-bold mb-2">스터디 개설</h2>
    <p class="text-muted mb-0">스터디 정보를 입력하고 팀원을 모집해보세요</p>
</section>

<section class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <form action="#" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">스터디 제목</label>
                            <input type="text" id="title" class="form-control" placeholder="예) 스프링 부트 스터디">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">스터디 설명</label>
                            <textarea id="description" class="form-control" rows="4" placeholder="스터디 목표, 진행 방식, 주기 등을 간단히 적어주세요"></textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">최대 인원 수</label>
                                <input type="number" id="maxMembers" class="form-control" min="2" max="50" value="5">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">카테고리</label>
                                <select id="categorySelect" class="form-select">
                                    <option selected disabled>카테고리를 선택하세요</option>
                                    <option>전공 / CS</option>
                                    <option>자격증</option>
                                    <option>코딩 테스트</option>
                                    <option>프로젝트</option>
                                    <option>외국어</option>
                                    <option>기타</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">공개 상태</label>
                                <select id="visibility" class="form-select">
                                    <option value="PUBLIC" selected>공개</option>
                                    <option value="PRIVATE">비공개</option>
                                </select>
                                <div class="form-text">비공개 시 초대 코드로만 입장 가능해요.</div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="/" class="btn btn-outline-primary">취소</a>
                            <button type="button" id="createStudyBtn" class="btn btn-primary">스터디 개설</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="text-center py-4 text-muted small">© 2026 Study Track</footer>
<script th:src="@{/js/nav-auth-area.js}"></script>
<script>
    document.getElementById("createStudyBtn").addEventListener("click", async function () {
        const token = localStorage.getItem("accessToken");
        if (!token) { alert("로그인이 필요합니다."); return; }

        const title = document.getElementById("title").value.trim();
        const description = document.getElementById("description").value.trim();
        const maxMembers = Number(document.getElementById("maxMembers").value);
        const categoryText = document.getElementById("categorySelect").value;
        const visibility = document.getElementById("visibility").value;

        const categoryMap = { "전공 / CS": "CS", "자격증": "CERTIFICATE", "코딩 테스트": "CODING_TEST", "프로젝트": "PROJECT", "외국어": "LANGUAGE", "기타": "ETC" };
        const category = categoryMap[categoryText];

        if (!title || !description || !category) { alert("입력값을 확인해주세요."); return; }

        const res = await fetch("/api/studyCreate", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ title, description, maxMembers, category, visibility })
        });

        if (res.ok) {
            const data = await res.json();
            alert("스터디 개설이 완료되었습니다!");
            window.location.href = `/study/${data.studyId}`;
        } else {
            alert("개설 실패: " + await res.text());
        }
    });
</script>
</body>
</html>
