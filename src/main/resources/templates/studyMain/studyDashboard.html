<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Track - Dashboard</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html { overflow-y: scroll; }
        .navbar .container { max-width: 1320px !important; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar bg-white shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold text-primary" href="/">📖 Study Track</a>
        <div id="navAuthArea" class="d-flex gap-2 align-items-center"></div>
    </div>
</nav>

<div class="container py-4">
    <div class="row mb-4">
        <div class="col">
            <div class="p-4 bg-white rounded shadow-sm">
                <h3 class="fw-bold mb-2">스터디 관리, 더 스마트하게</h3>
                <p class="text-muted mb-3">과제, 일정, 팀 관리를 하나의 대시보드에서</p>
                <a href="/study/create" class="btn btn-primary me-2">스터디 만들기</a>
                <a href="/study/list" class="btn btn-outline-primary">스터디 찾기</a>
            </div>
        </div>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="bg-white p-3 rounded shadow-sm"><h6 class="text-muted">참여 중 스터디</h6><h3>3</h3></div></div>
        <div class="col-md-3"><div class="bg-white p-3 rounded shadow-sm"><h6 class="text-muted">진행 중 과제</h6><h3>5</h3></div></div>
        <div class="col-md-3"><div class="bg-white p-3 rounded shadow-sm"><h6 class="text-muted">완료율</h6><h3>72%</h3></div></div>
        <div class="col-md-3"><div class="bg-white p-3 rounded shadow-sm"><h6 class="text-muted">팀원 수</h6><h3>12</h3></div></div>
    </div>
</div>
<script th:src="@{/js/nav-auth-area.js}"></script>
</body>
</html>
