<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Track - Community</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar bg-white shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold text-primary m-0" href="/">📖 Study Track</a>
        <div id="navAuthArea" class="d-flex gap-2 align-items-center"></div>
    </div>
</nav>

<section class="container py-5 text-center">
    <h2 class="fw-bold mb-2">함께 공부할 팀을 찾아보세요</h2>
    <p class="text-muted mb-3">스터디 모집부터 과제 관리까지 한 번에</p>
    <button id="btnStartStudy" onclick="startStudy()" class="btn btn-primary btn-lg">스터디 시작하기</button>
</section>

<section class="container pb-4">
    <h5 class="fw-bold mb-3">🔥 인기 스터디</h5>
    <div class="row g-3">
        <div class="col-md-4" th:each="study : ${popularStudies}">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <span class="badge bg-primary mb-2" th:text="${study.category}"></span>
                    <h6 class="fw-bold mt-1" th:text="${study.title}"></h6>
                    <p class="text-muted small" th:text="${study.description}"></p>
                    <a th:href="@{/study/{id}(id=${study.id})}" class="btn btn-sm btn-outline-primary">참여하기</a>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="bg-white py-5 text-center mt-4 shadow-sm">
    <h4 class="fw-bold mb-2">지금 바로 스터디를 만들어보세요</h4>
    <p class="text-muted mb-3">혼자보다 함께가 더 빠릅니다</p>
    <a href="/study/create" class="btn btn-primary btn-lg">스터디 개설</a>
</section>

<footer class="text-center py-4 text-muted small">© 2026 Study Track</footer>
<script th:src="@{/js/nav-auth-area.js}"></script>
<script>
    function startStudy() {
       // 1. 로컬 스토리지에서 유저 아이디 가져오기
       const userId = localStorage.getItem('userId');

       // 2. URL 파라미터로 붙여서 이동
       if (userId) {
           // 주소가 /study/start?userId=아이디 형식으로 바뀝니다.
           location.href = "/study/start?userId=" + encodeURIComponent(userId);
       } else {
           // 아이디가 없으면 그냥 이동
           location.href = "/study/start";
       }
   }
</script>
</body>
</html>
